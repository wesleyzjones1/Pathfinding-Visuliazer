<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pathfinding Algorithm Visualizer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=7" />
</head>
<body>
  <section id="controls-section">
    <div class="header-grid">
      <div class="header-left">
        <div class="controls-row">
          <button id="mode-start" class="ctrl-btn" data-mode="start"><span class="btn-dot dot-start"></span>Start</button>
          <button id="mode-end" class="ctrl-btn" data-mode="end"><span class="btn-dot dot-end"></span>End</button>
          <button id="mode-wall" class="ctrl-btn" data-mode="wall"><span class="btn-dot dot-wall"></span>Wall</button>
          <div class="algo-group">
            <label for="algo-select" class="algo-label">Algorithm</label>
            <select id="algo-select">
              <option value="astar">A*</option>
              <option value="dijkstra">Dijkstra</option>
              <option value="bfs">BFS</option>
              <option value="dfs">DFS</option>
              <option value="greedy">Greedy</option>
              <option value="bidirectional">Bidirectional</option>
              <option value="jps">Jump Point Search</option>
              <option value="iddfs">IDDFS</option>
              <option value="bestfirst">Best-First</option>
              <option value="thetastar">Theta*</option>
            </select>
          </div>
        </div>
        <div class="controls-row">
          <button id="run-btn" class="action-btn run-btn">&#9654; Run</button>
          <button id="reset-btn" class="action-btn secondary">&#8635; Reset</button>
          <div class="slider-group">
            <label for="speed" class="slider-label">Speed</label>
            <input id="speed" type="range" min="1" max="500" step="1" value="300" />
          </div>
          <label class="theme-switch" title="Toggle light/dark mode">
            <input type="checkbox" id="theme-toggle" />
            <span class="theme-track">
              <span class="theme-icon theme-icon-light">&#9788;</span>
              <span class="theme-icon theme-icon-dark">&#9790;</span>
              <span class="theme-thumb"></span>
            </span>
          </label>
        </div>
        <div class="controls-row preset-row">
          <span class="preset-label">Presets</span>
          <button class="preset-btn" data-preset="maze">&#9638; Maze</button>
          <button class="preset-btn" data-preset="scatter">&#10687; Scatter</button>
          <button class="preset-btn" data-preset="fortress">&#9723; Fortress</button>
          <button class="preset-btn" data-preset="spiral">&#10226; Spiral</button>
        </div>
      </div>

      <div class="header-center">
        <h1 id="title"><span class="title-icon">&#9671;</span> Pathfinding Visualizer</h1>
      </div>

      <div class="header-right">
        <div id="algo-desc">
          <h3 id="algo-desc-title">A*</h3>
          <p id="algo-desc-text">Uses both distance traveled and estimated distance to goal. Finds the shortest path efficiently by prioritizing promising routes.</p>
        </div>
        <div id="stats">
          <h3>Statistics</h3>
          <div id="stats-content">
            <div class="stat-row"><span class="stat-label">Iterations</span><span class="stat-value" id="stat-iterations">0</span></div>
            <div class="stat-row"><span class="stat-label">Path Length</span><span class="stat-value" id="stat-path">0</span></div>
            <div class="stat-row"><span class="stat-label">Time</span><span class="stat-value" id="stat-time">0ms</span></div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <main id="app">
    <div id="grid" class="grid"></div>
  </main>
    <script type="module" src="app.js?v=18"></script>
</body>
</html>
